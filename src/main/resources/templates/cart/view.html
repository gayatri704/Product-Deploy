<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart — ShopVerse</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="page-content">
    <h1>Shopping Cart</h1>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div th:if="${#lists.isEmpty(cartItems)}" class="empty-state">
        <div class="empty-icon">&#128722;</div>
        <h2>Your cart is empty</h2>
        <p>Add some products from our store.</p>
        <a class="btn btn-primary" th:href="@{/shop}">Continue Shopping</a>
    </div>

    <div th:unless="${#lists.isEmpty(cartItems)}" class="cart-layout">
        <div class="cart-items">
            <div class="cart-item" th:each="item : ${cartItems}">
                <img th:if="${item.product.imageName != null}"
                     th:src="@{/uploads/{img}(img=${item.product.imageName})}"
                     th:alt="${item.product.name}">
                <div class="cart-item-info">
                    <h3><a th:href="@{/shop/{id}(id=${item.product.id})}" th:text="${item.product.name}">Product</a></h3>
                    <p class="cart-item-price" th:text="'$' + ${item.product.price} + ' each'">$0</p>
                    <form th:action="@{/cart/{id}/update(id=${item.id})}" method="post" class="qty-form">
                        <label>Qty</label>
                        <input type="number" name="quantity" th:value="${item.quantity}" min="1" th:max="${item.product.stock}">
                        <button type="submit" class="btn btn-outline btn-sm">Update</button>
                    </form>
                </div>
                <div class="cart-item-total">
                    <strong th:text="'$' + (${item.product.price} * ${item.quantity})">$0</strong>
                    <form th:action="@{/cart/{id}/remove(id=${item.id})}" method="post" class="inline-form">
                        <button type="submit" class="btn btn-ghost btn-sm">Remove</button>
                    </form>
                </div>
            </div>
        </div>

        <aside class="cart-summary">
            <h2>Order Summary</h2>
            <div class="summary-row">
                <span>Subtotal</span>
                <strong th:text="'$' + ${cartTotal}">$0</strong>
            </div>
            <div class="summary-row">
                <span>Shipping</span>
                <strong>Free</strong>
            </div>
            <div class="summary-row total">
                <span>Total</span>
                <strong th:text="'$' + ${cartTotal}">$0</strong>
            </div>
            <a class="btn btn-primary btn-block btn-lg" th:href="@{/checkout}">Proceed to Checkout</a>
            <a class="btn btn-ghost btn-block" th:href="@{/shop}">Continue Shopping</a>
        </aside>
    </div>
</main>
</body>
</html>
