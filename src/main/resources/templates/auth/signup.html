<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — ShopVerse</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="auth-container">
    <div class="auth-card card-form">
        <div class="auth-header">
            <span class="logo-icon">&#9670;</span>
            <h1>Join ShopVerse</h1>
            <p class="subtitle">Create an account to start shopping</p>
        </div>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/signup}" method="post" class="auth-form">
            <label for="username">Username</label>
            <input id="username" type="text" name="username" required autofocus>

            <label for="email">Email</label>
            <input id="email" type="email" name="email" required>

            <label for="password">Password</label>
            <input id="password" type="password" name="password" minlength="6" required>

            <label for="confirmPassword">Confirm Password</label>
            <input id="confirmPassword" type="password" name="confirmPassword" minlength="6" required>

            <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>
        </form>

        <p class="auth-footer">
            Already have an account? <a th:href="@{/login}">Sign in</a>
        </p>
    </div>
</div>
</body>
</html>
