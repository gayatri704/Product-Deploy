<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ShopVerse</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="auth-container">
    <div class="auth-card card-form">
        <div class="auth-header">
            <span class="logo-icon">&#9670;</span>
            <h1>Welcome Back</h1>
            <p class="subtitle">Sign in to shop and track your orders</p>
        </div>

        <div th:if="${param.error}" class="alert alert-error">Invalid username or password.</div>
        <div th:if="${param.logout}" class="alert alert-success">You have been logged out successfully.</div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <form th:action="@{/login}" method="post" class="auth-form">
            <label for="username">Username</label>
            <input id="username" type="text" name="username" required autofocus>

            <label for="password">Password</label>
            <input id="password" type="password" name="password" required>

            <button type="submit" class="btn btn-primary btn-block btn-lg">Sign In</button>
        </form>

        <p class="auth-footer">
            Don't have an account? <a th:href="@{/signup}">Create one free</a>
        </p>
    </div>
</div>
</body>
</html>
