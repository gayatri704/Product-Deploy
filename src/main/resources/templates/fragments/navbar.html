<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<header class="site-header" th:fragment="navbar">
    <div class="header-inner">
        <a class="logo" th:href="@{/}">
            <span class="logo-icon">&#9670;</span>
            ShopVerse
        </a>

        <form class="header-search" th:action="@{/shop}" method="get">
            <input type="text" name="keyword" placeholder="Search products..." aria-label="Search">
            <button type="submit" aria-label="Search">&#128269;</button>
        </form>

        <nav class="header-nav">
            <a th:href="@{/shop}">Shop</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/orders}">Orders</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/products}">Admin</a>
        </nav>

        <div class="header-actions">
            <a sec:authorize="isAuthenticated()" class="cart-link" th:href="@{/cart}">
                <span class="cart-icon">&#128722;</span>
                <span class="cart-badge" th:if="${cartCount > 0}" th:text="${cartCount}">0</span>
            </a>

            <div sec:authorize="!isAuthenticated()" class="auth-links">
                <a class="btn btn-ghost btn-sm" th:href="@{/login}">Login</a>
                <a class="btn btn-primary btn-sm" th:href="@{/signup}">Sign Up</a>
            </div>

            <div sec:authorize="isAuthenticated()" class="user-menu">
                <span class="user-name" sec:authentication="name">user</span>
                <form th:action="@{/logout}" method="post" class="logout-form">
                    <button type="submit" class="btn btn-ghost btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </div>
</header>
</body>
</html>
